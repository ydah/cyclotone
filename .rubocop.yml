AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"

Metrics/BlockLength:
  Max: 40
  Exclude:
    - "spec/**/*"

Metrics/ModuleLength:
  Max: 260

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Layout/LineLength:
  Enabled: false

Layout/FirstArrayElementIndentation:
  Enabled: false

Style/MixinUsage:
  Enabled: false

Style/SymbolProc:
  Enabled: false

Style/Semicolon:
  Enabled: false

Naming/RescuedExceptionsVariableName:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

Lint/SuppressedException:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Lint/MissingSuper:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/BlockNesting:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/WhileUntilModifier:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/RedundantParentheses:
  Enabled: false

Style/MultilineBlockChain:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/HashEachMethods:
  Enabled: false

Style/HashExcept:
  Enabled: false

Style/KeywordParametersOrder:
  Enabled: false

Layout/MultilineMethodCallIndentation:
  Enabled: false

Naming/BlockForwarding:
  Enabled: false

Style/ArgumentsForwarding:
  Enabled: false

Style/ReduceToHash:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Lint/RedundantRequireStatement:
  Enabled: false
